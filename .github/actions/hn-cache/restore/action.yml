name: 'Restore HN data cache'
description: 'Restore current and previous week HN data from GH Actions cache'
runs:
  using: 'composite'
  steps:
    - id: weeks
      shell: bash
      run: |
        echo "cur_yr=$(date -u +%G)" >> $GITHUB_OUTPUT
        echo "cur_wk=W$(date -u +%V)" >> $GITHUB_OUTPUT
        echo "prev_yr=$(date -u -d '7 days ago' +%G)" >> $GITHUB_OUTPUT
        echo "prev_wk=W$(date -u -d '7 days ago' +%V)" >> $GITHUB_OUTPUT
    - uses: actions/cache/restore@v4
      with:
        path: _data/hn/${{ steps.weeks.outputs.cur_yr }}/${{ steps.weeks.outputs.cur_wk }}
        key: hn-data-${{ steps.weeks.outputs.cur_yr }}${{ steps.weeks.outputs.cur_wk }}-${{ github.run_id }}
        restore-keys: hn-data-${{ steps.weeks.outputs.cur_yr }}${{ steps.weeks.outputs.cur_wk }}-
    - uses: actions/cache/restore@v4
      with:
        path: _data/hn/${{ steps.weeks.outputs.prev_yr }}/${{ steps.weeks.outputs.prev_wk }}
        key: hn-data-${{ steps.weeks.outputs.prev_yr }}${{ steps.weeks.outputs.prev_wk }}-${{ github.run_id }}
        restore-keys: hn-data-${{ steps.weeks.outputs.prev_yr }}${{ steps.weeks.outputs.prev_wk }}-
