name: HN Auto-Summarizer

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure Git
        run: |
          git config user.name "HN Auto-Summarizer"
          git config user.email "hn-auto@yuedulijie.com"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.PAT_FOR_DEPLOY }}@github.com/${{ github.repository }}"

      - name: Run HN Auto-Summarizer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bundle exec ruby scripts/hn-auto.rb
