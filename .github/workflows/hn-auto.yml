name: HN Auto-Summarizer

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "AI 模型（默认 google/gemini-2.5-flash）"
        type: choice
        required: false
        default: "google/gemini-2.5-flash"
        options:
          - "google/gemini-2.5-flash"
          - "google/gemini-2.5-pro"
          - "deepseek/deepseek-v4-flash"
      mode:
        description: "运行模式 — auto 自动选择 / url 手动指定"
        type: choice
        required: false
        default: "auto"
        options:
          - "auto"
          - "url"
      hn_url:
        description: "HN 讨论 URL（mode=url 时必填）"
        required: false
        default: ""
      force_fetch:
        description: "强制重新抓取，忽略缓存"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure Git
        env:
          PAT: ${{ secrets.PAT_FOR_DEPLOY }}
        run: |
          git config user.name "HN Auto-Summarizer"
          git config user.email "hn-auto@yuedulijie.com"
          git config --add http.https://github.com/.extraheader \
            "AUTHORIZATION: basic $(printf '%s:' "$PAT" | base64 -w0)"
          git remote set-url origin "https://github.com/${{ github.repository }}"

      - name: Set week keys
        run: |
          echo "CUR_PATH=$(date -u +%G/W%V)" >> $GITHUB_ENV
          echo "CUR_KEY=$(date -u +%G-W%V)" >> $GITHUB_ENV
          echo "PREV_PATH=$(date -u -d '7 days ago' +%G/W%V)" >> $GITHUB_ENV
          echo "PREV_KEY=$(date -u -d '7 days ago' +%G-W%V)" >> $GITHUB_ENV

      - name: Restore current week cache
        uses: actions/cache/restore@v4
        with:
          path: _data/hn/${{ env.CUR_PATH }}
          key: hn-data-${{ env.CUR_KEY }}-${{ github.run_id }}
          restore-keys: hn-data-${{ env.CUR_KEY }}-

      - name: Restore previous week cache
        uses: actions/cache/restore@v4
        with:
          path: _data/hn/${{ env.PREV_PATH }}
          key: hn-data-${{ env.PREV_KEY }}-${{ github.run_id }}
          restore-keys: hn-data-${{ env.PREV_KEY }}-

      - name: Fetch HN data (cache layer)
        run: bundle exec ruby scripts/hn-fetch.rb --best

      - uses: ./.github/actions/setup-opencode

      - name: Generate articles (opencode auto)
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Clean up any orphaned _articles/ from previous failed run
          git checkout -- _articles/ 2>/dev/null || true
          git clean -fd _articles/ 2>/dev/null || true
          MODEL='${{ inputs.model }}'
          if [ -z "$MODEL" ]; then MODEL='google/gemini-2.5-flash'; fi
          MODE='${{ inputs.mode }}'
          HN_URL='${{ inputs.hn_url }}'
          FORCE='${{ inputs.force_fetch }}'
          FLAGS=""
          [ "$FORCE" = "true" ] && FLAGS="--force"
          if [ "$MODE" = "url" ]; then
            if [ -z "$HN_URL" ]; then
              echo "ERROR: mode=url 但 hn_url 为空"
              exit 1
            fi
            HN_CMD="/hn $HN_URL $FLAGS"
          else
            HN_CMD="/hn --auto $FLAGS"
          fi
          opencode run "$HN_CMD" --dir . \
            --dangerously-skip-permissions \
            --model "$MODEL" --print-logs 2>&1 | sed '/^timestamp=/d'

      - name: Validate Jekyll build
        run: bundle exec jekyll build

      - name: Push to master
        run: git push

      - name: Save current week cache
        # NOTE: 上周 cache entry 不显式 save，依赖 GitHub 7天无活动淘汰。
        # 如果实测发现上周 entry 提前过期（<7天），原因是 restore 不计为
        # activity。解决：给上周也加 cache/save（相同 key 覆盖，刷新活动
        # 时间戳）。当前标注「只读」是预期行为，先不加 save。
        uses: actions/cache/save@v4
        with:
          path: _data/hn/${{ env.CUR_PATH }}
          key: hn-data-${{ env.CUR_KEY }}-${{ github.run_id }}
