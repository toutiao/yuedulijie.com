name: HN Auto-Summarizer

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "AI 模型"
        type: choice
        required: false
        default: "deepseek/deepseek-v4-flash"
        options:
          - "google/gemini-2.5-flash"
          - "google/gemini-2.5-flash-lite"
          - "google/gemini-3.1-flash-lite"
          - "google/gemini-3.5-flash"
          - "deepseek/deepseek-v4-flash"
      mode:
        description: "运行模式 — auto 自动选择 / url 手动指定"
        type: choice
        required: false
        default: "auto"
        options:
          - "auto"
          - "url"
      hn_url:
        description: "HN 讨论 URL（mode=url 时必填）"
        required: false
        default: ""
      force_fetch:
        description: "强制重新抓取，忽略缓存"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        if: ${{ inputs.force_fetch == 'true' }}
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure Git
        env:
          PAT: ${{ secrets.PAT_FOR_DEPLOY }}
        run: |
          git config user.name "HN Auto-Summarizer"
          git config user.email "hn-auto@yuedulijie.com"
          git config --add http.https://github.com/.extraheader \
            "AUTHORIZATION: basic $(printf '%s:' "$PAT" | base64 -w0)"
          git remote set-url origin "https://github.com/${{ github.repository }}"

      - uses: ./.github/actions/setup-opencode

      - uses: ./.github/actions/hn-cache/restore

      - name: Fresh fetch (force only)
        if: ${{ inputs.force_fetch == 'true' }}
        run: |
          echo "Force fetch: refreshing HN data..."
          bundle exec ruby scripts/hn-fetch.rb --best --max 15 --fetch-articles-simple --jobs 5 --timeout 20 --force

      - name: Check API keys
        env:
          GOOGLE_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "=== Google Gemini ==="
          if [ -n "$GOOGLE_KEY" ]; then
            for model in gemini-2.5-flash gemini-2.5-flash-lite \
                         gemini-3.1-flash-lite gemini-3.5-flash; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                "https://generativelanguage.googleapis.com/v1/models/$model?key=$GOOGLE_KEY")
              printf "  %-30s %s\n" "$model" "$CODE"
            done
          else
            echo "  no key"
          fi
          echo "=== DeepSeek ==="
          if [ -n "$DEEPSEEK_KEY" ]; then
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.deepseek.com/v1/models \
              -H "Authorization: Bearer $DEEPSEEK_KEY")
            echo "  status: $CODE"
            [ "$CODE" = "200" ] && echo "  OK" || echo "  WARN: HTTP $CODE"
          else
            echo "  no key"
          fi

      - name: Generate articles (opencode auto)
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Clean up any orphaned _articles/ from previous failed run
          git checkout -- _articles/ 2>/dev/null || true
          git clean -fd _articles/ 2>/dev/null || true
          MODEL='${{ inputs.model }}'
          if [ -z "$MODEL" ]; then MODEL='deepseek/deepseek-v4-flash'; fi
          MODE='${{ inputs.mode }}'
          HN_URL='${{ inputs.hn_url }}'
          FORCE='${{ inputs.force_fetch }}'
          FLAGS=""
          [ "$FORCE" = "true" ] && FLAGS="--force"
          if [ "$MODE" = "url" ]; then
            if [ -z "$HN_URL" ]; then
              echo "ERROR: mode=url 但 hn_url 为空"
              exit 1
            fi
            HN_CMD="/hn $HN_URL $FLAGS"
          else
            HN_CMD="/hn --auto $FLAGS"
          fi
          opencode run "$HN_CMD" --dir . \
            --dangerously-skip-permissions \
            --model "$MODEL" 2>&1

      - name: Show changes
        run: |
          echo "=== Articles ==="
          ls -la _articles/ 2>/dev/null | tail -5 || echo "(empty)"
          echo "=== Git status ==="
          git status --short -- _articles/ 2>/dev/null || true

      - name: Validate Jekyll build
        if: ${{ inputs.force_fetch == 'true' }}
        run: bundle exec jekyll build

      - name: Push to master
        run: |
          git add -A _articles/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "feat: HN 自动摘要 $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          fi
          git push
