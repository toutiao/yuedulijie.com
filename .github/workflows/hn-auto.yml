name: HN Auto-Summarizer

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure Git
        env:
          PAT: ${{ secrets.PAT_FOR_DEPLOY }}
        run: |
          git config user.name "HN Auto-Summarizer"
          git config user.email "hn-auto@yuedulijie.com"
          git config --add http.https://github.com/.extraheader \
            "AUTHORIZATION: basic $(printf '%s:' "$PAT" | base64 -w0)"
          git remote set-url origin "https://github.com/${{ github.repository }}"

      - name: Run HN Auto-Summarizer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bundle exec ruby scripts/hn-auto.rb
