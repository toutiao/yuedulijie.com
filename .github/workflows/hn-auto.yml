name: HN Auto-Summarizer

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "AI 模型"
        type: choice
        required: false
        default: "deepseek/deepseek-v4-flash"
        options:
          - "google/gemini-2.5-flash"
          - "google/gemini-2.5-flash-lite"
          - "google/gemini-3.1-flash-lite"
          - "google/gemini-3.5-flash"
          - "deepseek/deepseek-v4-flash"
      mode:
        description: "运行模式 — auto / url"
        type: choice
        required: false
        default: "auto"
        options: [auto, url]
      hn_url:
        description: "HN URL（mode=url 必填）"
        required: false
        default: ""
      force_fetch:
        description: "忽略缓存重新抓取"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Config git
        env:
          PAT: ${{ secrets.PAT_FOR_DEPLOY }}
        run: |
          git config user.name "HN Auto-Summarizer"
          git config user.email "hn-auto@yuedulijie.com"
          git remote set-url origin "https://github.com/${{ github.repository }}"

      - uses: ./.github/actions/setup-opencode

      - uses: ./.github/actions/hn-cache/restore

      - name: Fetch fresh data
        run: bundle exec ruby scripts/hn-fetch.rb --best --max 15 --fetch-articles-simple --jobs 5 --timeout 20

      - name: Check API keys
        env:
          GOOGLE_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "=== Google Gemini ==="
          [ -n "$GOOGLE_KEY" ] && for m in gemini-2.5-flash gemini-2.5-flash-lite \
            gemini-3.1-flash-lite gemini-3.5-flash; do
            curl -s -o /dev/null -w "$m %{http_code}\n" \
              "https://generativelanguage.googleapis.com/v1/models/$m?key=$GOOGLE_KEY"
          done || echo "  no key"
          echo "=== DeepSeek ==="
          if [ -n "$DEEPSEEK_KEY" ]; then
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.deepseek.com/v1/models \
              -H "Authorization: Bearer $DEEPSEEK_KEY")
            echo "  status: $CODE"
            [ "$CODE" = "200" ] && echo "  OK" || echo "  WARN: HTTP $CODE"
          else
            echo "  no key"
          fi

      - name: Generate
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          git checkout -- _articles/ 2>/dev/null || true
          git clean -fd _articles/ 2>/dev/null || true
          M='${{ inputs.model }}'; M=${M:-deepseek/deepseek-v4-flash}
          F='${{ inputs.force_fetch }}'; FLAGS=""; [ "$F" = "true" ] && FLAGS="--force"
          if [ '${{ inputs.mode }}' = "url" ]; then
            U='${{ inputs.hn_url }}'; [ -z "$U" ] && { echo "ERROR: mode=url but hn_url empty"; exit 1; }
            C="/hn $U $FLAGS"
          else
            C="/hn --auto $FLAGS"
          fi
          opencode run "$C" --dir . --dangerously-skip-permissions --model "$M" --print-logs 2>&1

      - name: Show changes
        run: |
          ls -la _articles/ 2>/dev/null | tail -5 || echo "(empty)"
          git status --short -- _articles/ 2>/dev/null || true

      - name: Validate Jekyll
        run: bundle exec jekyll build

      - name: Push to master
        run: |
          git add -A _articles/
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "feat: HN 自动摘要 $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          git push
