title: 阅读理解
description: "中文阅读笔记 — 电影、书籍、文章与技术随笔"

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://yuedulijie.com"

timezone: Asia/Shanghai
encoding: utf-8

collections:
  essays:
    output: true
    permalink: /:collection/:name
  movies:
    output: true
    permalink: /:collection/:year/:name
  books:
    output: true
    permalink: /:collection/:year/:name
  articles:
    output: true
    permalink: /:collection/:year/:name

defaults:
  -
    scope:
      path: ""
      type: posts
    values:
      layout: "post"
  -
    scope:
      path: ""
      type: pages
    values:
      layout: "page"
  -
    scope:
      path: "_movies"
      type: movies
    values:
      categories: [movies]
      layout: "post"
  -
    scope:
      path: "_books"
      type: books
    values:
      categories: [books]
      layout: "post"
  -
    scope:
      path: "_articles"
      type: articles
    values:
      categories: [articles]
      layout: "post"
  -
    scope:
      type: "essays"
    values:
      layout: "post"
      author: "深井兵太郎"

github:
  build_revision: "dev"
  environment: "development"
  url: "https://yuedulijie.com"

plugins:
  - jekyll-seo-tag

sass:
  sass_dir: _sass/
  style: compressed

exclude:
  - .hn-articles-checksum
  - AGENTS.md
  - Dockerfile
  - docker-compose.yml
  - Makefile
  - opencode.jsonc
  - playwright-renderer/
  - scripts/
  - _site/
  - .github/
  - .opencode/
  - .env

compress_html:
  clippings: []
  comments: []
  endings: []
  ignore:
    envs: [development]
  blanklines: false
  profile: false
  startings: []
