services:
  jekyll:
    build:
      context: .
      target: dev
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        GEM_MIRROR: ${GEM_MIRROR:-}
    image: yuedulijie-jekyll:latest
    ports:
      - "4000:4000"
    volumes:
      - .:/site
      - bundle_data:/usr/local/bundle
    environment:
      - JEKYLL_ENV=development
      - PAGES_REPO_NWO=Lax/yuedulijie.com
    stdin_open: true
    tty: true

  build:
    build:
      context: .
      target: build
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        GEM_MIRROR: ${GEM_MIRROR:-}
    image: yuedulijie-jekyll:latest
    profiles:
      - cli
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/site
      - bundle_data:/usr/local/bundle
    environment:
      - JEKYLL_ENV=production
      - PAGES_REPO_NWO=Lax/yuedulijie.com
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - no_proxy=${NO_PROXY:-}

  renderer:
    build:
      context: playwright-renderer
      network: host
      args:
        http_proxy: http://127.0.0.1:64540
        https_proxy: http://127.0.0.1:64540
        no_proxy: localhost,127.0.0.0/8,::1
    image: yuedulijie-renderer:latest
    network_mode: host
    restart: unless-stopped
    environment:
      - http_proxy=http://127.0.0.1:64540
      - https_proxy=http://127.0.0.1:64540
      - no_proxy=localhost,127.0.0.0/8,::1

volumes:
  bundle_data:
